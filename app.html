<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board</title>
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <strong>Board</strong>
      <span id="userInfo"></span>
    </div>

    <div class="topbar-right">
      <button id="saveBoardBtn">Salvar</button>
      <button id="logoutBtn">Sair</button>
    </div>
  </header>

  <main id="board" class="board"></main>

  <div id="contextMenu" class="context-menu hidden">
    <button id="newColumnBtn">Nova coluna</button>
  </div>

  <div id="cardModal" class="modal hidden">
    <div class="modal-box">
      <h2>Card</h2>
      <input id="cardTitleInput" type="text" placeholder="Título do card" />
      <textarea id="cardDescInput" placeholder="Descrição"></textarea>

      <div class="modal-actions">
        <button id="deleteCardBtn" class="danger">Excluir</button>
        <button id="closeModalBtn">Fechar</button>
        <button id="saveCardBtn">Salvar card</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
