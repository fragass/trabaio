<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App</title>
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left"></div>

    <div class="topbar-right">
      <div class="profile-menu" id="profileMenu">
        <button class="profile-trigger" id="profileTrigger" type="button">
          <span class="profile-name" id="userInfo">@usuario</span>
        </button>

        <div class="profile-dropdown" id="profileDropdown">
          <button id="logoutBtn" class="dropdown-logout" type="button">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main id="board" class="board"></main>

  <button id="floatingAddColumnBtn" class="floating-add-column" type="button" title="Nova coluna">
    +
  </button>

  <div id="contextMenu" class="context-menu hidden">
    <button id="ctxAddColumnBtn" type="button">Nova coluna</button>
    <button id="ctxAddCardBtn" type="button">Novo card</button>
    <button id="ctxAddCheckCardBtn" type="button">Novo card checkbox</button>
    <button id="ctxEditBtn" type="button">Editar</button>
    <button id="ctxToggleDoneBtn" type="button">Marcar como concluído</button>
    <button id="ctxDeleteBtn" class="danger" type="button">Remover</button>
  </div>

  <div id="cardModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="cardModalTitle">Card</h2>
        <button id="closeModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <input id="cardTitleInput" type="text" placeholder="Título do card" />
      <textarea id="cardDescInput" placeholder="Descrição"></textarea>

      <label class="checkbox-row">
        <input id="cardDoneInput" type="checkbox" />
        <span>Concluído</span>
      </label>

      <div class="modal-actions">
        <button id="deleteCardBtn" class="danger" type="button">Excluir</button>
        <button id="saveCardBtn" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <div id="columnModal" class="modal hidden">
    <div class="modal-box modal-box-small">
      <div class="modal-header">
        <h2 id="columnModalTitle">Nova coluna</h2>
        <button id="closeColumnModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <input id="columnNameInput" type="text" placeholder="Nome da coluna" />

      <div class="modal-actions">
        <button id="deleteColumnBtn" class="danger hidden" type="button">Excluir</button>
        <button id="saveColumnBtn" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-box modal-box-small">
      <div class="modal-header">
        <h2 id="confirmTitle">Confirmar</h2>
        <button id="closeConfirmModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <p id="confirmMessage" class="confirm-message">Tem certeza?</p>

      <div class="modal-actions">
        <button id="cancelConfirmBtn" type="button">Cancelar</button>
        <button id="acceptConfirmBtn" class="danger" type="button">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
